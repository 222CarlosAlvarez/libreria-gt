<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Panel Usuario
    </title>

    <link rel="stylesheet" href="css/base.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>

verificarLogin();

</script>

<header>

    <div class="header-container">

        <h1>
            📚 LIBRERÍA ESCOLAR GT
        </h1>

        <nav>

            <button onclick="window.location.href='perfil.html'">
                Perfil
            </button>

            <button onclick="logout()">
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<div class="container">

    <div class="card">

        <h2>
            Bienvenido
        </h2>

        <p id="usuario"></p>

    </div>

    <div class="info">

        <div class="card">

            <h3>
                📦 Inventario
            </h3>

            <p>
                Consultar productos disponibles.
            </p>

            <button
                onclick="
                window.location.href='catalogo.html'
                "
            >
                Abrir
            </button>

        </div>

        <div class="card">

            <h3>
                🛍 Productos
            </h3>

            <p>
                Ver listado de productos.
            </p>

            <button
                onclick="
                window.location.href='productos.html'
                "
            >
                Abrir
            </button>

        </div>

        <div class="card">

            <h3>
                🌐 Catálogo Público
            </h3>

            <p>
                Vista para clientes.
            </p>

            <button
                onclick="
                window.location.href='catalogo-publico.html'
                "
            >
                Ver
            </button>

        </div>

        <div class="card">

            <h3>
                👤 Perfil
            </h3>

            <p>
                Consultar datos personales.
            </p>

            <button
                onclick="
                window.location.href='perfil.html'
                "
            >
                Abrir
            </button>

        </div>

    </div>

</div>

<script>

document.getElementById('usuario').innerHTML =
'Usuario: ' +
localStorage.getItem('nombre');

</script>

</body>

</html>
