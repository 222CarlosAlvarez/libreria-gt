<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Panel Usuario</title>

    <link
        rel="stylesheet"
        href="css/dashboard-user.css"
    >

</head>

<body>

<script src="js/auth.js"></script>

<script>

    verificarLogin();

</script>

<header>

    <div class="header-container">

        <div>

            <h1>📚 Librería</h1>

            <p>
                Panel de Usuario
            </p>

        </div>

        <nav>

            <button
                onclick="window.location.href='catalogo.html'"
            >
                Inventario
            </button>

            <button
                onclick="window.location.href='productos.html'"
            >
                Productos
            </button>

            <button
                onclick="window.location.href='perfil.html'"
            >
                Perfil
            </button>

            <button
                class="logout"
                onclick="logout()"
            >
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<main>

    <section class="bienvenida">

        <h2>
            Bienvenido
        </h2>

        <p id="usuario"></p>

    </section>

    <section class="dashboard-grid">

        <div class="dashboard-card">

            <h3>📦 Inventario</h3>

            <p>
                Consultar productos registrados.
            </p>

            <button
                onclick="window.location.href='catalogo.html'"
            >
                Abrir
            </button>

        </div>

        <div class="dashboard-card">

            <h3>➕ Productos</h3>

            <p>
                Agregar nuevos productos.
            </p>

            <button
                onclick="window.location.href='productos.html'"
            >
                Abrir
            </button>

        </div>

        <div class="dashboard-card">

            <h3>👤 Mi Perfil</h3>

            <p>
                Actualizar información personal.
            </p>

            <button
                onclick="window.location.href='perfil.html'"
            >
                Abrir
            </button>

        </div>

    </section>

</main>

<footer>

    © 2026 Librería

</footer>

<script>

document.getElementById('usuario').innerHTML =
    localStorage.getItem('nombre') || '';

</script>

</body>

</html>
