<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Productos | Librería Escolar GT</title>

    <link rel="stylesheet" href="css/base.css">

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>
    verificarLogin();
</script>

<header>

    <div class="header-container">

        <h1>📚 Librería Escolar GT</h1>

        <nav>

            <input
                type="file"
                id="excelFile"
                accept=".xlsx,.xls"
            >

            <button onclick="importarExcel()">
                Importar Excel
            </button>

            <button onclick="exportarExcel()">
                Exportar Excel
            </button>

            <button onclick="exportarPDF()">
                Exportar PDF
            </button>

            <button class="panel" onclick="irPanel()">
                Panel
            </button>

            <button onclick="window.location.href='productos.html'">
                Productos
            </button>

            <button class="perfil" onclick="window.location.href='perfil.html'">
                Perfil
            </button>

            <button onclick="window.location.href='catalogo.html'">
                Inventario
            </button>

            <button class="logout" onclick="logout()">
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<div class="container">

    <div class="card">

        <h2>📚 Catálogo de Material Escolar y Tecnología</h2>

        <p>
            Consulta todos los productos registrados en el inventario.
        </p>

    </div>

    <div class="card" id="inventarioCard">

        <h3>📊 Resumen de Inventario</h3>

        <p>
            Total de productos:
            <strong id="totalProductos">0</strong>
        </p>

        <p>
            Stock total:
            <strong id="stockTotal">0</strong>
        </p>

    </div>

    <div class="card">

        <h2>🔎 Buscar Productos</h2>

        <input
            type="text"
            id="busquedaProductos"
            placeholder="Buscar por nombre, SKU o categoría..."
            onkeyup="filtrarProductos()"
        >

        <select
            id="filtroCategoriaProductos"
            onchange="filtrarProductos()"
        >

            <option value="todas">
                Todas las categorías
            </option>

        </select>

    </div>

    <div
        id="productos"
        class="productos-grid"
    >
    </div>

</div>

<!-- MODAL IMAGEN -->

<div
    id="modalImagen"
    class="modal-img"
>

    <span
        class="close-img"
        onclick="cerrarImagen()"
    >
        &times;
    </span>

    <div class="zoom-controls">

        <button onclick="resetZoom(event)">
            🔄 Reset
        </button>

    </div>

    <img
        id="imgZoom"
        src=""
        alt="Imagen Producto"
    >

</div>

<script src="js/productos.js"></script>

</body>

</html>
