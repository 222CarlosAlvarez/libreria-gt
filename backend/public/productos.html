<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Productos | Librería Escolar GT
    </title>

    <link rel="stylesheet" href="css/base.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>

verificarLogin();

</script>

<header>

    <div class="header-container">

        <h1>
            📚 LIBRERÍA ESCOLAR GT
        </h1>

        <nav>

            <button
                onclick="
                window.location.href=
                'dashboard-user.html'
                "
            >
                Panel
            </button>

            <button onclick="logout()">
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<div class="container">

    <div class="card">

        <h2>
            🛍 Productos Disponibles
        </h2>

        <p>
            Consulta el inventario de la librería.
        </p>

    </div>

    <!-- BUSCADOR -->

    <div class="card">

        <input
            type="text"
            id="busquedaProductos"
            placeholder="Buscar productos..."
            onkeyup="filtrarProductos()"
        >

        <select
            id="filtroCategoriaProductos"
            onchange="filtrarProductos()"
        >

            <option value="todas">
                Todas las categorías
            </option>

        </select>

    </div>

    <!-- GRID PRODUCTOS -->

    <div id="productos" class="productos-grid"></div>

</div>

<script src="js/productos.js"></script>

</body>

</html>
