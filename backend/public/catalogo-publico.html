<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Catálogo de Libros</title>

    <link
        rel="stylesheet"
        href="css/catalogo-publico.css"
    >

</head>

<body>

<header>

    <div class="header-container">

        <div>

            <h1>📚 Librería</h1>

            <p>
                Catálogo público de productos
            </p>

        </div>

        <div>

            <button
                onclick="window.location.href='index.html'"
            >
                Inicio
            </button>

            <button
                onclick="window.location.href='login.html'"
            >
                Iniciar Sesión
            </button>

        </div>

    </div>

</header>

<section class="buscador-section">

    <h2>
        Explora nuestro catálogo
    </h2>

    <div class="filtros">

        <input
            type="text"
            id="buscar"
            placeholder="Buscar producto..."
            onkeyup="filtrarProductos()"
        >

        <select
            id="categoriaFiltro"
            onchange="filtrarProductos()"
        >

            <option value="">
                Todas las categorías
            </option>

        </select>

    </div>

    <p id="contadorProductos"></p>

</section>

<section>

    <div id="catalogo"></div>

</section>

<!-- VISOR IMAGEN -->

<div
    id="visorImagen"
    class="visor"
>

    <span
        class="cerrar"
        onclick="cerrarImagen()"
    >
        ×
    </span>

    <img
        id="imagenGrande"
        class="imagen-grande"
    >

</div>

<!-- DESCRIPCIÓN -->

<div
    id="modalDescripcion"
    class="visor"
>

    <div class="descripcion-box">

        <span
            class="cerrar"
            onclick="cerrarDescripcion()"
        >
            ×
        </span>

        <h2>
            Descripción completa
        </h2>

        <p id="textoDescripcion"></p>

    </div>

</div>

<footer>

    <p>

        © 2026 Librería

    </p>

</footer>

<script src="js/catalogo-publico.js"></script>

</body>

</html>
