<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo TECHNOVA GT</title>

<link rel="stylesheet" href="css/catalogo-publico.css">

</head>

<body>

<header>

<h1>TECHNOVA GT</h1>

<h3>Catálogo de Productos</h3>

</header>

<div class="filtros">

    <input
        type="text"
        id="buscar"
        placeholder="Buscar producto..."
        onkeyup="filtrarProductos()"
    >

    <select
        id="categoriaFiltro"
        onchange="filtrarProductos()"
    >

        <option value="">
            Todas las categorías
        </option>

    </select>

</div>

<p id="contadorProductos"></p>

<div id="catalogo"></div>

<div
    class="productos-grid"
    id="catalogo">
</div>

<div id="visorImagen" class="visor">

    <span
        class="cerrar"
        onclick="cerrarImagen()"
    >
        ×
    </span>

    <img
        id="imagenGrande"
        class="imagen-grande"
    >

</div>

<div id="modalDescripcion"
     class="visor">

    <div class="descripcion-box">

        <span
            class="cerrar"
            onclick="cerrarDescripcion()"
        >
            ×
        </span>

        <h2>Descripción</h2>

        <p id="textoDescripcion"></p>

    </div>

</div>

<script src="js/catalogo-publico.js"></script>

</body>
</html>
