<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo LIBRERIA ESCOLAR GT</title>

<link rel="stylesheet" href="css/catalogo-publico.css">

</head>

<body>

<header>

<h1>LIBRERIA ESCOLAR GT</h1>

<h3>Catálogo de Productos</h3>

</header>

<div class="filtros">

    <input
        type="text"
        id="buscar"
        placeholder="Buscar producto..."
        onkeyup="filtrarProductos()"
    >

    <select
        id="categoriaFiltro"
        onchange="filtrarProductos()"
    >

        <option value="">
            Todas las categorías
        </option>

    </select>

</div>

<p id="contadorProductos"></p>

<div id="barraAbecedario" class="barra-abecedario">

    <button onclick="filtrarLetra('TODOS')">
        Todos
    </button>

    <button onclick="filtrarLetra('#')">#</button>

    <button onclick="filtrarLetra('A')">A</button>
    <button onclick="filtrarLetra('B')">B</button>
    <button onclick="filtrarLetra('C')">C</button>
    <button onclick="filtrarLetra('D')">D</button>
    <button onclick="filtrarLetra('E')">E</button>
    <button onclick="filtrarLetra('F')">F</button>
    <button onclick="filtrarLetra('G')">G</button>
    <button onclick="filtrarLetra('H')">H</button>
    <button onclick="filtrarLetra('I')">I</button>
    <button onclick="filtrarLetra('J')">J</button>
    <button onclick="filtrarLetra('K')">K</button>
    <button onclick="filtrarLetra('L')">L</button>
    <button onclick="filtrarLetra('M')">M</button>
    <button onclick="filtrarLetra('N')">N</button>
    <button onclick="filtrarLetra('O')">O</button>
    <button onclick="filtrarLetra('P')">P</button>
    <button onclick="filtrarLetra('Q')">Q</button>
    <button onclick="filtrarLetra('R')">R</button>
    <button onclick="filtrarLetra('S')">S</button>
    <button onclick="filtrarLetra('T')">T</button>
    <button onclick="filtrarLetra('U')">U</button>
    <button onclick="filtrarLetra('V')">V</button>
    <button onclick="filtrarLetra('W')">W</button>
    <button onclick="filtrarLetra('X')">X</button>
    <button onclick="filtrarLetra('Y')">Y</button>
    <button onclick="filtrarLetra('Z')">Z</button>

</div>

<div id="indiceLetras" class="indice-letras"></div>

<div id="catalogo"></div>

<div
    class="productos-grid"
    id="catalogo">
</div>

<div id="visorImagen" class="visor">

    <span
        class="cerrar"
        onclick="cerrarImagen()"
    >
        ×
    </span>

    <img
        id="imagenGrande"
        class="imagen-grande"
    >

</div>

<div id="modalDescripcion"
     class="visor">

    <div class="descripcion-box">

        <span
            class="cerrar"
            onclick="cerrarDescripcion()"
        >
            ×
        </span>

        <h2>Descripción</h2>

        <p id="textoDescripcion"></p>

    </div>

</div>

<script src="js/catalogo-publico.js"></script>

</body>
</html>
