<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Catálogo TECHNOVA GT</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>TECHNOVA GT</h1>

<h3>Catálogo de Productos</h3>

</header>

<div class="filtros">

    <input
        type="text"
        id="buscar"
        placeholder="Buscar producto..."
        onkeyup="filtrarProductos()"
    >

    <select
        id="categoriaFiltro"
        onchange="filtrarProductos()"
    >

        <option value="">
            Todas las categorías
        </option>

    </select>

</div>

<p id="contadorProductos"></p>

<div id="catalogo"></div>

<div
    class="productos-grid"
    id="catalogo">
</div>

<script src="js/catalogo-publico.js"></script>

</body>
</html>
