<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Catálogo Público | Librería Escolar GT
    </title>

    <link rel="stylesheet" href="css/base.css">

    <link rel="stylesheet" href="css/publico.css">

</head>

<body>

<header>

    <div class="header-container">

        <h1>
            📚 LIBRERÍA ESCOLAR GT
        </h1>

        <nav>

            <button
                onclick="window.location.href='index.html'"
            >
                Inicio
            </button>

            <button
                onclick="window.location.href='login.html'"
            >
                Iniciar Sesión
            </button>

        </nav>

    </div>

</header>

<div class="container">

    <div class="catalogo-header">

        <h1>
            Catálogo Público
        </h1>

        <p>

            Consulta todos los productos
            disponibles de la librería.

        </p>

    </div>

    <!-- FILTROS -->

    <div class="card">

        <div class="filtros">

            <input
                type="text"
                id="buscar"
                placeholder="Buscar producto..."
                onkeyup="filtrarProductos()"
            >

            <select
                id="categoriaFiltro"
                onchange="filtrarProductos()"
            >

                <option value="">
                    Todas las categorías
                </option>

            </select>

        </div>

        <p id="contadorProductos"></p>

    </div>

    <!-- PRODUCTOS -->

    <div id="catalogo"></div>

</div>

<!-- VISOR DE IMAGEN -->

<div
    id="visorImagen"
    class="visor"
>

    <span
        class="cerrar"
        onclick="cerrarImagen()"
    >
        ×
    </span>

    <img
        id="imagenGrande"
        class="imagen-grande"
        alt="Imagen Producto"
    >

</div>

<!-- MODAL DESCRIPCIÓN -->

<div
    id="modalDescripcion"
    class="visor"
>

    <div class="descripcion-box">

        <span
            class="cerrar"
            onclick="cerrarDescripcion()"
        >
            ×
        </span>

        <h2>
            Descripción Completa
        </h2>

        <p id="textoDescripcion"></p>

    </div>

</div>

<footer>

    <p>

        © 2026 LIBRERÍA ESCOLAR GT

    </p>

</footer>

<script src="js/catalogo-publico.js"></script>

</body>

</html>
