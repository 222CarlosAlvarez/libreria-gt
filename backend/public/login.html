<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Librería - Inicio de Sesión</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="overlay">

    <div class="login-container">

        <div class="logo-area">

            <h1>📚 Librería</h1>

            <p>
                Bienvenido al sistema de inventario
            </p>

        </div>

        <!-- LOGIN -->

        <div class="card">

            <h2>Iniciar Sesión</h2>

            <input
                type="email"
                id="loginEmail"
                placeholder="Correo electrónico"
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Contraseña"
            >

            <button
                class="btn-primary"
                onclick="login()"
            >
                Ingresar
            </button>

            <button
                class="btn-secondary"
                onclick="window.location.href='catalogo-publico.html'"
            >
                Ver Catálogo Público
            </button>

        </div>

        <!-- REGISTRO ADMIN -->

        <div class="card">

            <h2>Crear Administrador</h2>

            <p class="info">
                Se requiere clave maestra.
            </p>

            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
            >

            <input
                type="email"
                id="email"
                placeholder="Correo"
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
            >

            <input
                type="password"
                id="adminKey"
                placeholder="Clave maestra"
            >

            <button
                class="btn-success"
                onclick="crearAdmin()"
            >
                Crear Cuenta
            </button>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
