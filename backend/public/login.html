<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Iniciar Sesión | Librería Escolar GT
    </title>

    <link rel="stylesheet" href="css/base.css">

    <link rel="stylesheet" href="css/publico.css">

</head>

<body class="login-page">

<div class="login-wrapper">

    <!-- LOGIN -->

    <div class="login-card">

        <h2>
            📚 LIBRERÍA ESCOLAR GT
        </h2>

        <p>

            Ingresa con tu cuenta para acceder
            al sistema de inventario y gestión.

        </p>

        <input
            type="email"
            id="loginEmail"
            placeholder="Correo electrónico"
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Contraseña"
        >

        <button onclick="login()">
            Iniciar Sesión
        </button>

        <br><br>

        <button
            type="button"
            onclick="
            window.location.href=
            'catalogo-publico.html'
            "
        >
            📦 Ver Catálogo Público
        </button>

        <br><br>

        <button
            type="button"
            onclick="
            window.location.href=
            'index.html'
            "
        >
            ⬅ Volver al Inicio
        </button>

    </div>

    <!-- CREAR ADMIN -->

    <div class="login-card">

        <h2>
            Crear Cuenta Administrador
        </h2>

        <p>

            Para registrar un administrador
            es necesaria la clave maestra.

        </p>

        <input
            type="text"
            id="nombre"
            placeholder="Nombre completo"
        >

        <input
            type="email"
            id="email"
            placeholder="Correo electrónico"
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <input
            type="password"
            id="adminKey"
            placeholder="Clave maestra"
        >

        <button onclick="crearAdmin()">
            Crear Administrador
        </button>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
