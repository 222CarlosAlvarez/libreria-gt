<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administración</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>

verificarLogin();
verificarAdmin();

</script>

<header>

<div class="header-container">

<h1>TECHNOVA GT</h1>

<nav>

<button class="panel" onclick="irPanel()">
🏠 Panel
</button>

<button onclick="window.location.href='productos.html'">
📦 Productos
</button>

<button class="perfil" onclick="window.location.href='perfil.html'">
👤 Perfil
</button>

<button onclick="window.location.href='catalogo.html'">
📚 Catálogo
</button>

<button class="logout" onclick="logout()">
🚪 Cerrar Sesión
</button>

</nav>

</div>

</header>

<div class="admin-container">

<!-- CREAR USUARIO -->

<div class="card admin-card">

<h2>➕ Crear Usuario</h2>

<input type="text" id="nuevoNombre" placeholder="Nombre">

<input type="email" id="nuevoEmail" placeholder="Correo Electrónico">

<input type="password" id="nuevoPassword" placeholder="Contraseña">

<select id="nuevoRol">

<option value="user">
Usuario
</option>

<option value="admin">
Administrador
</option>

</select>

<button onclick="crearUsuario()">
Crear Usuario
</button>

</div>

<!-- LISTADO -->

<div class="card admin-card">

<h2>👥 Usuarios Registrados</h2>

<div id="usuarios"></div>

</div>

</div>

<div class="admin-footer">

<button onclick="window.location.href='dashboard-admin.html'">
⬅ Volver al Panel
</button>

</div>

<script src="js/admin.js"></script>

</body>

</html>
