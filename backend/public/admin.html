<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Administración de Usuarios
    </title>

    <link rel="stylesheet" href="css/base.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>

verificarLogin();
verificarAdmin();

</script>

<header>

    <div class="header-container">

        <h1>
            📚 LIBRERÍA ESCOLAR GT
        </h1>

        <nav>

            <button
                onclick="
                window.location.href=
                'dashboard-admin.html'
                "
            >
                Panel
            </button>

            <button onclick="logout()">
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<div class="container">

    <!-- CREAR USUARIO -->

    <div class="card">

        <h2>
            👤 Crear Usuario
        </h2>

        <input
            type="text"
            id="nuevoNombre"
            placeholder="Nombre"
        >

        <input
            type="email"
            id="nuevoEmail"
            placeholder="Correo"
        >

        <input
            type="password"
            id="nuevoPassword"
            placeholder="Contraseña"
        >

        <select id="nuevoRol">

            <option value="user">
                Usuario
            </option>

            <option value="admin">
                Administrador
            </option>

        </select>

        <button onclick="crearUsuario()">

            Crear Usuario

        </button>

    </div>

    <!-- LISTADO -->

    <div class="card">

        <h2>
            👥 Usuarios Registrados
        </h2>

        <div id="usuarios"></div>

    </div>

</div>

<script src="js/admin.js"></script>

</body>

</html>
