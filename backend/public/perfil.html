<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Mi Perfil
    </title>

    <link rel="stylesheet" href="css/base.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>

verificarLogin();

</script>

<header>

    <div class="header-container">

        <h1>
            📚 LIBRERÍA ESCOLAR GT
        </h1>

        <nav>

            <button onclick="volverPanel()">
                Panel
            </button>

            <button onclick="logout()">
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<div class="container">

    <div
        class="card"
        style="max-width:700px;margin:auto;"
    >

        <h2>
            👤 Mi Perfil
        </h2>

        <hr>

        <p>

            <strong>Nombre:</strong>

            <span id="perfilNombre"></span>

        </p>

        <p>

            <strong>Correo:</strong>

            <span id="correo"></span>

        </p>

        <p>

            <strong>Rol:</strong>

            <span id="perfilRol"></span>

        </p>

        <br>

        <button onclick="volverPanel()">

            Volver al Panel

        </button>

    </div>

</div>

<script>

document.getElementById('perfilNombre').innerHTML =
localStorage.getItem('nombre');

document.getElementById('correo').innerHTML =
localStorage.getItem('email');

document.getElementById('perfilRol').innerHTML =
localStorage.getItem('role');

</script>

</body>

</html>
