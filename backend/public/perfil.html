<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Mi Perfil</title>

    <link
        rel="stylesheet"
        href="css/perfil.css"
    >

</head>

<body>

<script src="js/auth.js"></script>

<script>

    verificarLogin();

</script>

<header>

    <div class="header-container">

        <div>

            <h1>📚 Librería</h1>

            <p>Perfil de Usuario</p>

        </div>

        <nav>

            <button onclick="irPanel()">
                Panel
            </button>

            <button
                onclick="window.location.href='catalogo.html'"
            >
                Inventario
            </button>

            <button
                onclick="window.location.href='productos.html'"
            >
                Productos
            </button>

            <button
                class="logout"
                onclick="logout()"
            >
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<main>

    <div class="perfil-card">

        <div class="avatar">

            👤

        </div>

        <h2 id="perfilNombre"></h2>

        <div class="info">

            <div class="dato">

                <span class="titulo">
                    Correo
                </span>

                <span id="correo"></span>

            </div>

            <div class="dato">

                <span class="titulo">
                    Rol
                </span>

                <span id="perfilRol"></span>

            </div>

        </div>

        <button
            class="btn-panel"
            onclick="volverPanel()"
        >
            Volver al Panel
        </button>

    </div>

</main>

<footer>

    © 2026 Librería

</footer>

<script>

document.getElementById('perfilNombre').innerHTML =
    localStorage.getItem('nombre');

document.getElementById('correo').innerHTML =
    localStorage.getItem('email');

document.getElementById('perfilRol').innerHTML =
    localStorage.getItem('role');

</script>

</body>

</html>
