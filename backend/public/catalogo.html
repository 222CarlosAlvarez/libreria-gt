<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<script src="js/auth.js"></script>

<script>

    verificarLogin();

</script>
<body>
<header>

    <div class="header-container">

        <h1>TECHNOVA GT</h1>

        <nav>

    <button class="panel" onclick="irPanel()">
        Panel
    </button>

    <button onclick="window.location.href='productos.html'">
        Productos
    </button>

    <button class="perfil" onclick="window.location.href='perfil.html'">
        Perfil
    </button>

    <button onclick="window.location.href='catalogo.html'">
        Catálogo
    </button>

    <button class="logout" onclick="logout()">
        Cerrar Sesión
    </button>

</nav>

    </div>

</header>

<div class="container">

    <div class="card">

    <h2>Inventario</h2>


    <input type="text" id="sku" placeholder="SKU del producto">

    <input type="text" id="nombre" placeholder="Nombre Producto">

    <input type="text" id="marca" placeholder="Marca">

    <!-- CATEGORIA EXISTENTE -->

<select id="categoriaExistente">

    <option value="">
        Seleccionar categoría
    </option>

</select>

<!-- NUEVA CATEGORIA -->

<input
    type="text"
    id="nuevaCategoria"
    placeholder="Nueva categoría (opcional)"
>

    <textarea id="descripcion" placeholder="Descripción"></textarea>

    <input type="number" id="precio" placeholder="Precio">

    <input type="number" id="cantidad" placeholder="Cantidad">

    <input type="text" id="imagen" placeholder="URL Imagen">

    <label>O subir imagen:</label>

<input
    type="file"
    id="archivoImagen"
    accept="image/*"
>

    <select id="tipoMovimiento">

        <option value="entrada">
            Entrada de Inventario
        </option>

        <option value="salida">
            Salida de Inventario
        </option>

    </select>

    <button onclick="agregarProducto()">
        Guardar Producto
    </button>

</div>

<div class="layout-inventario">

    <!-- LADO IZQUIERDO -->
    <div class="panel-filtros">

        <div class="card">

            <h2>Buscar Producto</h2>

            <input
                type="text"
                id="busqueda"
                placeholder="Buscar producto..."
                onkeyup="filtrarProductos()"
            >

            <select
                id="filtroCategoria"
                onchange="filtrarProductos()"
            >
                <option value="todas">
                    Todas las categorías
                </option>
            </select>

        </div>

    </div>

    <!-- LADO DERECHO -->
    <div class="panel-inventario">

        <div class="card">

            <h2>Inventario Completo</h2>

            <div class="tabla-container">

                <table>

                    <thead>
    <tr>
        <th>#</th>

        <th>Producto</th>

        <th>Categoría</th>

        <th>Marca</th>

        <th>Precio</th>

        <th>Stock</th>

        <th>Estado</th>

        <th>Creado</th>

        <th>Actualizado</th>

        <th>Acciones</th>
    </tr>
</thead>

                    <tbody id="tablaBody"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</div>

    <div id="productos"></div>

</div>
<!-- MODAL EDITAR -->

<div id="modalEditar" class="modal">

    <div class="modal-content">

        <h2>Editar Producto</h2>

        <input type="hidden" id="editId">

        <input type="text" id="editNombre">

        <input type="text" id="editMarca">

        <input type="text" id="editCategoria">

        <textarea id="editDescripcion"></textarea>

        <input type="number" id="editPrecio">

        <input type="number" id="editCantidad">

        <input type="text" id="editImagen">

        <div class="modal-buttons">

            <button onclick="guardarEdicion()">
                Guardar Cambios
            </button>

            <button onclick="cerrarModal()">
                Cancelar
            </button>

        </div>

    </div>

</div>

<div id="modalImagen" class="modal-img">

    <span class="close-img" onclick="cerrarImagen()">
        &times;
    </span>

    <div class="zoom-controls">

        <button onclick="resetZoom(event)">
            🔄 Reset
        </button>

    </div>

    <img id="imgZoom" src="">

</div>

<div id="modalImagen" class="modal-img">

    <div class="zoom-controls">

        <button onclick="resetZoom(event)">
            🔄 Reset
        </button>

    </div>

    <img id="imgZoom" src="">

</div>

<!-- MODAL ZOOM IMAGEN -->
<div id="modalImagen" class="modal-img" onclick="cerrarImagen()">

    <img id="imgZoom" src="">

</div>
<script src="js/productos.js"></script>
<script src="js/catalogo.js"></script>
<script src="js/config.js"></script>

</body>
</html>
