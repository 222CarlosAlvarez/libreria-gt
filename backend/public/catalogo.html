<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Inventario | Librería Escolar GT</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>

    verificarLogin();

</script>

<header>

    <div class="header-container">

        <div>

            <h1>Librería Escolar GT</h1>

            <p class="subtitulo-header">
                Gestión de Inventario Escolar
            </p>

        </div>

        <nav>

            <button
                class="panel"
                onclick="irPanel()"
            >
                Panel
            </button>

            <button
                onclick="window.location.href='productos.html'"
            >
                Productos
            </button>

            <button
                class="perfil"
                onclick="window.location.href='perfil.html'"
            >
                Perfil
            </button>

            <button
                onclick="window.location.href='catalogo.html'"
            >
                Inventario
            </button>

            <button
                class="logout"
                onclick="logout()"
            >
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<main class="inventario-layout">

    <!-- PANEL IZQUIERDO -->

    <aside class="inventario-sidebar">

        <div class="card">

            <h2>
                Agregar Producto
            </h2>

            <input
                type="text"
                id="nombre"
                placeholder="Nombre del producto"
            >

            <input
                type="text"
                id="marca"
                placeholder="Marca"
            >

            <select id="categoriaExistente">

                <option value="">
                    Seleccionar categoría
                </option>

            </select>

            <input
                type="text"
                id="nuevaCategoria"
                placeholder="Nueva categoría (opcional)"
            >

            <textarea
                id="descripcion"
                placeholder="Descripción"
            ></textarea>

            <input
                type="number"
                id="precio"
                placeholder="Precio"
            >

            <input
                type="text"
                id="sku"
                placeholder="SKU"
            >

            <input
                type="number"
                id="cantidad"
                placeholder="Cantidad"
            >

            <input
                type="text"
                id="imagen"
                placeholder="URL de Imagen"
            >

            <label class="label-upload">

                Subir Imagen

            </label>

            <input
                type="file"
                id="archivoImagen"
                accept="image/*"
            >

            <select id="tipoMovimiento">

                <option value="entrada">
                    Entrada de Inventario
                </option>

                <option value="salida">
                    Salida de Inventario
                </option>

            </select>

            <button
                onclick="agregarProducto()"
            >
                Guardar Producto
            </button>

        </div>

    </aside>

    <!-- PANEL DERECHO -->

    <section class="inventario-content">

        <div class="card">

            <h2>
                Buscar Productos
            </h2>

            <input
                type="text"
                id="busqueda"
                placeholder="Buscar por nombre, SKU, marca o categoría..."
                onkeyup="filtrarProductos()"
            >

            <select
                id="filtroCategoria"
                onchange="filtrarProductos()"
            >

                <option value="todas">
                    Todas las categorías
                </option>

            </select>

        </div>

        <div class="card">

            <h2>
                Inventario General
            </h2>

            <div class="tabla-container">

                <table>

                    <thead>

                        <tr>

                            <th>#</th>

                            <th>Producto</th>

                            <th>SKU</th>

                            <th>Categoría</th>

                            <th>Marca</th>

                            <th>Precio</th>

                            <th>Stock</th>

                            <th>Estado</th>

                            <th>Creado</th>

                            <th>Actualizado</th>

                            <th>Acciones</th>

                        </tr>

                    </thead>

                    <tbody id="tablaBody">

                    </tbody>

                </table>

            </div>

        </div>

    </section>

</main>

<!-- MODAL EDITAR -->

<div
    id="modalEditar"
    class="modal"
>

    <div class="modal-content">

        <h2>
            Editar Producto
        </h2>

        <input
            type="hidden"
            id="editId"
        >

        <input
            type="text"
            id="editNombre"
            placeholder="Nombre"
        >

        <input
            type="text"
            id="editMarca"
            placeholder="Marca"
        >

        <input
            type="text"
            id="editCategoria"
            placeholder="Categoría"
        >

        <textarea
            id="editDescripcion"
            placeholder="Descripción"
        ></textarea>

        <input
            type="number"
            id="editPrecio"
            placeholder="Precio"
        >

        <input
            type="number"
            id="editCantidad"
            placeholder="Cantidad"
        >

        <input
            type="text"
            id="editImagen"
            placeholder="Imagen"
        >

        <div class="modal-buttons">

            <button
                onclick="guardarEdicion()"
            >
                Guardar Cambios
            </button>

            <button
                onclick="cerrarModal()"
            >
                Cancelar
            </button>

        </div>

    </div>

</div>

<!-- MODAL IMAGEN -->

<div
    id="modalImagen"
    class="modal-img"
>

    <span
        class="close-img"
        onclick="cerrarImagen()"
    >
        &times;
    </span>

    <div class="zoom-controls">

        <button
            onclick="resetZoom(event)"
        >
            🔄 Reset
        </button>

    </div>

    <img
        id="imgZoom"
        src=""
    >

</div>

<script src="js/catalogo.js"></script>

</body>
</html>
