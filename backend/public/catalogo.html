<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Inventario | Librería Escolar GT
    </title>

    <link rel="stylesheet" href="css/base.css">

</head>

<body>

<script src="js/auth.js"></script>

<script>

verificarLogin();

</script>

<header>

    <div class="header-container">

        <h1>
            📚 LIBRERÍA ESCOLAR GT
        </h1>

        <nav>

            <button
                onclick="
                window.location.href=
                'dashboard-admin.html'
                "
            >
                Panel
            </button>

            <button onclick="logout()">
                Cerrar Sesión
            </button>

        </nav>

    </div>

</header>

<div class="container">

    <!-- FORMULARIO -->

    <div class="card">

        <h2>
            📦 Registrar Producto
        </h2>

        <input id="nombre" placeholder="Nombre">

        <input id="marca" placeholder="Marca">

        <input id="sku" placeholder="SKU">

        <input id="precio" type="number" placeholder="Precio">

        <input id="cantidad" type="number" placeholder="Cantidad">

        <textarea id="descripcion" placeholder="Descripción"></textarea>

        <input id="imagen" placeholder="URL Imagen">

        <button onclick="agregarProducto()">

            Guardar Producto

        </button>

    </div>

    <!-- BUSCADOR -->

    <div class="card">

        <h2>
            🔍 Buscar Productos
        </h2>

        <input
            type="text"
            id="busqueda"
            placeholder="Buscar..."
            onkeyup="filtrarProductos()"
        >

        <select
            id="filtroCategoria"
            onchange="filtrarProductos()"
        >

            <option value="todas">
                Todas las categorías
            </option>

        </select>

    </div>

    <!-- TABLA INVENTARIO -->

    <div class="card">

        <h2>
            📋 Inventario
        </h2>

        <div class="tabla-container">

            <table>

                <thead>

                    <tr>

                        <th>#</th>
                        <th>Producto</th>
                        <th>SKU</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/catalogo.js"></script>

</body>

</html>
